{% extends "base.html" %}

{% block content %}
<div class="max-w-md mx-auto mt-10">
    <h2 class="text-3xl font-bold text-center text-gray-800 mb-6">Registro de Usuario</h2>
    
    <div class="bg-white shadow-md rounded-lg px-8 pt-6 pb-8 mb-4 border border-gray-200">
        <form method="POST" action="{{ url_for('registro') }}">
            <div class="mb-4">
                <label class="block text-gray-700 text-sm font-bold mb-2" for="nombre_usuario">
                    Nombre de usuario <span class="text-red-500">*</span>
                </label>
                <input class="shadow-sm appearance-none border rounded w-full py-2 px-3 text-gray-700 leading-tight focus:outline-none focus:ring-2 focus:ring-blue-500 transition" 
                       id="nombre_usuario" name="nombre_usuario" type="text" placeholder="Nombre único en sistema" required>
            </div>

            <div class="mb-4">
                <label class="block text-gray-700 text-sm font-bold mb-2" for="correo_usuario">
                    Correo electrónico <span class="text-red-500">*</span>
                </label>
                <input class="shadow-sm appearance-none border rounded w-full py-2 px-3 text-gray-700 leading-tight focus:outline-none focus:ring-2 focus:ring-blue-500 transition" 
                       id="correo_usuario" name="correo_usuario" type="email" placeholder="ejemplo@correo.com" required>
            </div>

            <div class="mb-4">
                <label class="block text-gray-700 text-sm font-bold mb-2" for="nombre_completo_usuario">
                    Nombre completo <span class="text-red-500">*</span>
                </label>
                <input class="shadow-sm appearance-none border rounded w-full py-2 px-3 text-gray-700 leading-tight focus:outline-none focus:ring-2 focus:ring-blue-500 transition" 
                       id="nombre_completo_usuario" name="nombre_completo_usuario" type="text" placeholder="Tu nombre real" required>
            </div>

            <div class="mb-6">
                <label class="block text-gray-700 text-sm font-bold mb-2" for="password">
                    Contraseña <span class="text-red-500">*</span>
                </label>
                <input class="shadow-sm appearance-none border rounded w-full py-2 px-3 text-gray-700 mb-3 leading-tight focus:outline-none focus:ring-2 focus:ring-blue-500 transition" 
                       id="password" name="password" type="password" placeholder="*************" required>
            </div>

            <div class="flex items-center justify-between mt-4">
                <button class="w-full bg-green-600 hover:bg-green-700 text-white font-bold py-3 px-4 rounded focus:outline-none focus:shadow-outline transition duration-300" type="submit">
                    Crear mi cuenta
                </button>
            </div>
        </form>
    </div>
    
    <p class="text-center text-gray-600 text-sm">
        ¿Ya tienes una cuenta? <a href="{{ url_for('login') }}" class="text-blue-600 hover:text-blue-800 font-semibold transition">Inicia sesión</a>
    </p>
</div>
{% endblock %}
