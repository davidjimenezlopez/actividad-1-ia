{% extends "base.html" %}

{% block content %}
<div class="max-w-md mx-auto mt-12">
    <h2 class="text-3xl font-bold text-center text-gray-800 mb-6">Iniciar Sesión</h2>
    
    <div class="bg-white shadow-md rounded-lg px-8 pt-6 pb-8 mb-4 border border-gray-200">
        <form method="POST" action="{{ url_for('login') }}">
            <div class="mb-4">
                <label class="block text-gray-700 text-sm font-bold mb-2" for="nombre_usuario">
                    Nombre de usuario
                </label>
                <input class="shadow-sm appearance-none border rounded w-full py-3 px-3 text-gray-700 leading-tight focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition" 
                       id="nombre_usuario" name="nombre_usuario" type="text" placeholder="Ej: admin" required>
            </div>
            
            <div class="mb-6">
                <label class="block text-gray-700 text-sm font-bold mb-2" for="password">
                    Contraseña
                </label>
                <input class="shadow-sm appearance-none border rounded w-full py-3 px-3 text-gray-700 mb-3 leading-tight focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition" 
                       id="password" name="password" type="password" placeholder="*************" required>
            </div>
            
            <div class="flex items-center justify-between mt-6">
                <button class="w-full bg-blue-600 hover:bg-blue-800 text-white font-bold py-3 px-4 rounded focus:outline-none focus:shadow-outline transition duration-300" type="submit">
                    Ingresar
                </button>
            </div>
        </form>
    </div>
    
    <p class="text-center text-gray-600 text-sm">
        ¿No tienes una cuenta? <a href="{{ url_for('registro') }}" class="text-blue-600 hover:text-blue-800 font-semibold transition">Regístrate aquí</a>
    </p>
</div>
{% endblock %}
