{% extends "base.html" %}

{% block content %}
<div class="max-w-2xl mx-auto mt-6">
    <div class="bg-white shadow-md rounded-lg px-8 pt-6 pb-8 mb-4 border border-gray-200">
        <h2 class="text-2xl font-bold text-gray-800 mb-6 border-b pb-2">Añadir un Nuevo Libro al Catálogo</h2>
        
        <form method="POST" action="{{ url_for('agregar_libro') }}">
            <!-- Fila 1: Título y Autor -->
            <div class="flex flex-wrap -mx-3 mb-4">
                <div class="w-full md:w-1/2 px-3 mb-4 md:mb-0">
                    <label class="block uppercase tracking-wide text-gray-700 text-xs font-bold mb-2" for="titulo">
                        Título del libro <span class="text-red-500">*</span>
                    </label>
                    <input class="appearance-none block w-full bg-gray-50 text-gray-700 border border-gray-200 rounded py-3 px-4 leading-tight focus:outline-none focus:bg-white focus:border-blue-500 transition" 
                           id="titulo" name="titulo" type="text" placeholder="Ej: Rayuela" required>
                </div>
                <div class="w-full md:w-1/2 px-3">
                    <label class="block uppercase tracking-wide text-gray-700 text-xs font-bold mb-2" for="autor">
                        Autor <span class="text-red-500">*</span>
                    </label>
                    <input class="appearance-none block w-full bg-gray-50 text-gray-700 border border-gray-200 rounded py-3 px-4 leading-tight focus:outline-none focus:bg-white focus:border-blue-500 transition" 
                           id="autor" name="autor" type="text" placeholder="Ej: Julio Cortázar" required>
                </div>
            </div>

            <!-- Fila 2: ISBN y Año -->
            <div class="flex flex-wrap -mx-3 mb-4">
                <div class="w-full md:w-1/2 px-3 mb-4 md:mb-0">
                    <label class="block uppercase tracking-wide text-gray-700 text-xs font-bold mb-2" for="isbn">
                        ISBN <span class="text-red-500">*</span>
                    </label>
                    <input class="appearance-none block w-full bg-gray-50 text-gray-700 border border-gray-200 rounded py-3 px-4 leading-tight focus:outline-none focus:bg-white focus:border-blue-500 transition" 
                           id="isbn" name="isbn" type="text" placeholder="Ej: 978-8420412146" required>
                </div>
                <div class="w-full md:w-1/2 px-3">
                    <label class="block uppercase tracking-wide text-gray-700 text-xs font-bold mb-2" for="anio_publicacion">
                        Año de Publicación
                    </label>
                    <input class="appearance-none block w-full bg-gray-50 text-gray-700 border border-gray-200 rounded py-3 px-4 leading-tight focus:outline-none focus:bg-white focus:border-blue-500 transition" 
                           id="anio_publicacion" name="anio_publicacion" type="number" placeholder="Ej: 1963">
                </div>
            </div>

            <!-- Fila 3: Temas y Copias -->
            <div class="flex flex-wrap -mx-3 mb-4">
                <div class="w-full md:w-2/3 px-3 mb-4 md:mb-0">
                    <label class="block uppercase tracking-wide text-gray-700 text-xs font-bold mb-2" for="temas">
                        Temas / Categoría
                    </label>
                    <input class="appearance-none block w-full bg-gray-50 text-gray-700 border border-gray-200 rounded py-3 px-4 leading-tight focus:outline-none focus:bg-white focus:border-blue-500 transition" 
                           id="temas" name="temas" type="text" placeholder="Ej: Novela, Vanguardia, Ficción">
                </div>
                <div class="w-full md:w-1/3 px-3">
                    <label class="block uppercase tracking-wide text-gray-700 text-xs font-bold mb-2" for="copias_totales">
                        Copias Totales <span class="text-red-500">*</span>
                    </label>
                    <input class="appearance-none block w-full bg-gray-50 text-gray-700 border border-gray-200 rounded py-3 px-4 leading-tight focus:outline-none focus:bg-white focus:border-blue-500 transition" 
                           id="copias_totales" name="copias_totales" type="number" min="1" value="1" required>
                </div>
            </div>

            <!-- Fila 4: Portada -->
            <div class="mb-8">
                <label class="block uppercase tracking-wide text-gray-700 text-xs font-bold mb-2" for="portada">
                    URL de la Portada
                </label>
                <input class="appearance-none block w-full bg-gray-50 text-gray-700 border border-gray-200 rounded py-3 px-4 leading-tight focus:outline-none focus:bg-white focus:border-blue-500 transition" 
                       id="portada" name="portada" type="text" placeholder="https://ejemplo.com/imagen.jpg">
                <p class="text-gray-500 text-xs italic mt-2">Dejar en blanco si no se tiene imagen.</p>
            </div>

            <!-- Botones -->
            <div class="flex items-center justify-end border-t pt-4">
                <a href="{{ url_for('index') }}" class="text-gray-600 hover:text-gray-800 font-semibold py-2 px-4 mr-4 transition duration-300">
                    Cancelar
                </a>
                <button class="bg-yellow-500 hover:bg-yellow-600 text-white font-bold py-2 px-6 rounded shadow focus:outline-none focus:shadow-outline transition duration-300" type="submit">
                    Guardar Libro
                </button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
